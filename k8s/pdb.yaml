apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mongo-pdb
  namespace: three-tier-app
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mongo
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: three-tier-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: three-tier-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
