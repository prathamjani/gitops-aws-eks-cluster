apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: three-tier-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/prathamjani/gitops-aws-eks-cluster.git' 
    targetRevision: HEAD
    path: k8s 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: three-tier-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
